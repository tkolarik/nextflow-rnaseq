name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Nextflow
        run: |
          curl -fsSL https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/nextflow

      - name: Build Docker image
        run: docker build -t rna-seq-nextflow-aws:0.1.0 .

      - name: Run smoke pipeline
        run: nextflow run main.nf -profile test

      - name: Assert smoke outputs
        run: python3 bin/assert_transcript_counts.py results/test/counts/transcript_counts.tsv prok_R1

      - name: Install nf-test
        run: |
          curl -fsSL https://get.nf-test.com | bash
          sudo mv nf-test /usr/local/bin/nf-test

      - name: Run nf-test suite
        run: nf-test test tests/main.nf.test --profile test
